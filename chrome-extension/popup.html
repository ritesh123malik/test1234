<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 20px; font-family: -apple-system, system-ui, sans-serif; background: #050505; color: white; margin: 0; }
    .card { background: #111; border: 1px border-gray-800; border-radius: 16px; padding: 20px; }
    h1 { font-size: 14px; font-weight: 800; margin: 0 0 4px; uppercase tracking-widest text-blue-500; }
    p { font-size: 11px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    label { font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; margin-bottom: 6px; display: block; }
    input { width: 100%; box-sizing: border-box; background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; font-size: 12px; font-family: monospace; margin-bottom: 20px; }
    input:focus { border-color: #2563eb; outline: none; }
    button { width: 100%; background: #2563eb; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    button:hover { background: #1d4ed8; transform: translateY(-1px); }
    .status { margin-top: 15px; font-size: 10px; text-align: center; font-weight: 800; padding: 8px; border-radius: 6px; display: none; }
    .status.success { display: block; background: #064e3b; color: #34d399; }
    .status.error { display: block; background: #450a0a; color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Workspace_Connector</h1>
    <p>Sync questions from LeetCode & GFG directly to your workspace.</p>
    
    <label>Access Token</label>
    <input type="password" id="token" placeholder="Paste your auth token...">
    
    <button id="save">Connect_Workspace</button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
